<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo List | Home</title>
    <!-- SEO -->
    <meta name="description" content="Pagina Web ToDo List">
    <meta name="keywords" content="Pagina ToDo List, Lista de Tareas, ToDo List">
    <meta name="author" content="Koridormi">
    <!-- Recursos -->
    <link rel="icon" type="image/x-icon" href="#">
    <link rel="stylesheet" href="./build/css/style.css">
    <!-- Scripts -->
    <script type="module" src="./build/js/app.js"></script>
</head>
<body>
    <header class="ToDo-encabezado">
        <h1>My ToDo List</h1>
    </header>

    <main class="ToDo-main">
        <section class="ToDo-main__contenedor">
            <h2>Panel Principal</h2>

            <div class="contenedor__agregar-tareas">
                <h3>Agrega una Tarea</h3>

                <form id="formulario">
                    <div>
                        <label for="tarea">Tarea</label>
                        <input id="tarea" type="text" name="text" placeholder="Escribe una tarea.." value="">
                    </div>

                    <button id="agregarTarea" type="submit">Agregar</button>
                </form>
            </div>

            <div class="contenedor__tareas-pendientes">
                <h3>Tareas Pendientes</h3>

                <div class="tareas__lista-pendientes">
                    <!-- JS Generate -->
                </div>
            </div>

            <div class="contenedor__tareas-completadas">
                <h3>Tareas Completas</h3>

                <div class="tareas__lista-completadas">
                    <div class="tareas__contenedor">
                        <!-- <div>
                            <p>Tarea-Completada</p>
                            <button>Un-Check</button>
                        </div>

                        <div>
                            <button>X</button>
                        </div> -->
                    </div>
                </div>
            </div>
        </section>

        <button class="ToDo-main__limpiar">Limpiar Todas Las Tareas</button>
    </main>

    <footer class="ToDo-footer">
        <p>Todos los derechos reservados</p>
    </footer>
</body>
</html>
